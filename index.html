<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="CPBloomFX - Copy Trading Investment Platform">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="CPBloomFX">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>CPBloomFX</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://js.paystack.co/v1/inline.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { padding-top: 48px; }

    #app-download-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 9999;
      min-height: 48px;
    }
    #app-download-banner .banner-content {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }
    #app-download-banner .banner-icon {
      font-size: 20px;
      flex-shrink: 0;
    }
    #app-download-banner .banner-text {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #app-download-banner .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: #4caf50;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    #app-download-banner .download-btn:hover {
      background: #43a047;
    }
    #app-download-banner .close-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      font-size: 22px;
      cursor: pointer;
      padding: 0 4px;
      flex-shrink: 0;
      line-height: 1;
    }
    #app-download-banner .close-btn:hover {
      color: rgba(255,255,255,0.9);
    }

    @media (max-width: 480px) {
      #app-download-banner .banner-text {
        font-size: 12px;
      }
      #app-download-banner .download-btn {
        font-size: 11px;
        padding: 5px 10px;
      }
    }
  </style>
</head>
<body>
  <div id="app-download-banner">
    <div class="banner-content">
      <span class="banner-icon">📱</span>
      <span class="banner-text">Get the mobile app for a better experience</span>
      <a class="download-btn" href="#" id="download-apk-btn" target="_blank" rel="noopener">
        Download APK
      </a>
      <button class="close-btn" id="close-banner-btn" aria-label="Close">&times;</button>
    </div>
  </div>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
  <script>
    (function() {
      var dismissed = localStorage.getItem('downloadBannerDismissed');
      var banner = document.getElementById('app-download-banner');
      var closeBtn = document.getElementById('close-banner-btn');
      var downloadBtn = document.getElementById('download-apk-btn');

      if (dismissed === 'true') {
        banner.style.display = 'none';
        document.body.style.paddingTop = '0';
      }

      closeBtn.addEventListener('click', function() {
        banner.style.display = 'none';
        document.body.style.paddingTop = '0';
        localStorage.setItem('downloadBannerDismissed', 'true');
      });

      // Replace this with the actual APK URL on your server
      downloadBtn.href = '/downloads/BloomFX-1.0.0.apk';
    })();
  </script>
</body>
</html>
